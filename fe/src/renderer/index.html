<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VecDb Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>VisionDB</h1>
        <br>
        <div id="inputMethods">
          <input type="text" id="query-input" placeholder="Search for..." />
          <p> or </p>
          <button id="query-button">Search with Image</button>
          <p> or </p>
          <button id="upload-button" type="button">
            <span class="upload-label">Upload Images</span>
          </button>
        </div>
        <div id="status" role="status" aria-live="polite"></div>
        
      </header>

      <div id="results" class="results">

      </div>

      <section class="panel embedding-map">
        <div class="map-header">
          <div>
            <h2>Embedding map</h2>
            <p class="map-note">Projects the query vector and nearest neighbors into 2D.</p>
          </div>
          <div class="map-controls">
            <label>
              Method
              <select id="map-method">
                <option value="pca" selected>PCA</option>
                <option value="tsne">t-SNE</option>
                <option value="umap">UMAP</option>
              </select>
            </label>
            <label>
              Neighbors
              <input id="map-limit" type="number" min="10" max="200" value="60" />
            </label>
            <button id="map-button" type="button">Generate map</button>
          </div>
        </div>
        <p id="map-status" class="map-status">Run a text search to visualize embeddings.</p>
        <div class="map-canvas-wrap">
          <canvas id="map-canvas" width="900" height="520"></canvas>
          <div id="map-tooltip" class="map-tooltip" role="status" aria-live="polite"></div>
        </div>
      </section>
      
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
