<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VecDb Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>VisionDB</h1>
        <br>
        <div id="inputMethods">
          <input type="text" id="query-input" placeholder="Search for..." />
          <p> or </p>
          <button id="query-button">Search with Image</button>
          <p> or </p>
          <button id="upload-button" type="button">
            <span class="upload-label">Upload Images</span>
          </button>
        </div>
        <div id="status" role="status" aria-live="polite"></div>
        
      </header>

      <div id="results" class="results">

      </div>
      
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
